services:
  mysql-db:
    image: mysql:8.0
    container_name: parking-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: parking_db
    ports:
      - "3307:3306"
    volumes:
      - ./database-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: parking-user-service
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASS=password
      - DB_NAME=parking_db
      - PORT=3001
    depends_on:
      mysql-db:
        condition: service_healthy

  parking-service:
    build:
      context: ./backend/parking-service
      dockerfile: Dockerfile
    container_name: parking-parking-service
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASS=password
      - DB_NAME=parking_db
      - PORT=3002
    depends_on:
      mysql-db:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: parking-notification-service
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - PORT=3003

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: parking-api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - PARKING_SERVICE_URL=http://parking-service:3002
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      - user-service
      - parking-service
      - notification-service
